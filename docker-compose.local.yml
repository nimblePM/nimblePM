# Docker Compose for using local source code
version: '3.7'

networks:
  network:

volumes:
  pgdata:
  opdata:

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: openproject
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - network

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.local
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-your-secret-key-here}
      DATABASE_URL: postgresql://openproject:openproject@postgres:5432/openproject
      OPENPROJECT_CACHE__MEMCACHE__SERVER: cache:11211
      OPENPROJECT_RAILS__CACHE__STORE: memcache
      OPENPROJECT_HOST__NAME: localhost:3000
      OPENPROJECT_PROTOCOL: http
      OPENPROJECT_HTTPS: false
    volumes:
      - opdata:/app/public/assets
      - ./app:/app/app:cached  # Use your local app code
      - ./config:/app/config:cached
      - ./lib:/app/lib:cached
      - ./public:/app/public:cached
    networks:
      - network
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - cache

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile.local
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-your-secret-key-here}
      DATABASE_URL: postgresql://openproject:openproject@postgres:5432/openproject
      OPENPROJECT_CACHE__MEMCACHE__SERVER: cache:11211
      OPENPROJECT_RAILS__CACHE__STORE: memcache
    volumes:
      - opdata:/app/public/assets
      - ./app:/app/app:cached
      - ./config:/app/config:cached
      - ./lib:/app/lib:cached
    networks:
      - network
    command: bundle exec good_job start
    depends_on:
      - postgres
      - cache

  cache:
    image: memcached
    restart: unless-stopped
    networks:
      - network
