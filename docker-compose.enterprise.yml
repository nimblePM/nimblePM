version: '3.8'

networks:
  network:

volumes:
  opdata:
  
services:
  cache:
    image: memcached
    restart: unless-stopped
    networks:
      - network

  web:
    build:
      context: .
      dockerfile: ./Dockerfile.enterprise
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      # External database connection
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-192.168.3.99}:${DB_PORT:-5433}/${DB_NAME:-postgres}
      OPENPROJECT_CACHE__MEMCACHE__SERVER: cache:11211
      OPENPROJECT_RAILS__CACHE__STORE: memcache
      OPENPROJECT_WEB_WORKERS: ${WEB_WORKERS:-2}
      OPENPROJECT_WEB_MIN__THREADS: ${WEB_MIN_THREADS:-2}
      OPENPROJECT_WEB_MAX__THREADS: ${WEB_MAX_THREADS:-4}
      OPENPROJECT_RAILS__SERVE__STATIC__FILES: 'true'
      OPENPROJECT_EDITION: ${OPENPROJECT_EDITION:-standard}
      # Host configuration
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST__NAME:-192.168.3.94}
      OPENPROJECT_PROTOCOL: ${OPENPROJECT_PROTOCOL:-http}
      OPENPROJECT_HTTPS: ${OPENPROJECT_HTTPS:-false}
      # Default admin account
      OPENPROJECT_SEED_ADMIN_USER__PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - opdata:/var/openproject/assets
      - ./files:/var/openproject/files
      # Mount the patch file directly
      - ./enterprise_token_patch.rb:/app/app/models/enterprise_token.rb:ro
    networks:
      - network
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - cache
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile.enterprise  
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      # External database connection
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-192.168.3.99}:${DB_PORT:-5433}/${DB_NAME:-postgres}
      OPENPROJECT_CACHE__MEMCACHE__SERVER: cache:11211
      OPENPROJECT_RAILS__CACHE__STORE: memcache
      OPENPROJECT_EDITION: ${OPENPROJECT_EDITION:-standard}
    volumes:
      - opdata:/var/openproject/assets
      - ./files:/var/openproject/files
      # Mount the patch file directly
      - ./enterprise_token_patch.rb:/app/app/models/enterprise_token.rb:ro
    networks:
      - network
    depends_on:
      - cache
    extra_hosts:
      - "host.docker.internal:host-gateway"